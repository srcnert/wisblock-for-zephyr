CONFIG_SPI=y
CONFIG_SDHC=y
CONFIG_SDMMC_STACK=y

CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# Lora
CONFIG_LORA=y
CONFIG_LORAWAN=y
# Select your region
# CONFIG_LORAMAC_REGION_AS923=y
# CONFIG_LORAMAC_REGION_AU915=y
# CONFIG_LORAMAC_REGION_CN470=y
# CONFIG_LORAMAC_REGION_CN779=y
# CONFIG_LORAMAC_REGION_EU433=y
# CONFIG_LORAMAC_REGION_KR920=y
# CONFIG_LORAMAC_REGION_IN865=y
# CONFIG_LORAMAC_REGION_RU864=y
# CONFIG_LORAMAC_REGION_US915=y
CONFIG_LORAMAC_REGION_EU868=y
CONFIG_LORAWAN_SERVICES=n
CONFIG_LORAWAN_NVM_SETTINGS=y

# NVS required to store LoRaWAN DevNonce
# as per LoRaWAN 1.0.4/1.1 Specifications.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y

# SD Card
CONFIG_DISK_ACCESS=y
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_PRINTK=n
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_UART=n
CONFIG_LOG_BACKEND_FS=y
CONFIG_LOG_BACKEND_FS_OUTPUT_TEXT=y
CONFIG_LOG_BACKEND_FS_DIR="/SD:"
CONFIG_LOG_BACKEND_FS_FILE_PREFIX="log"
CONFIG_LOG_BACKEND_FS_FILES_LIMIT=100
CONFIG_LOG_BACKEND_FS_FILE_SIZE=131072
CONFIG_LOG_BACKEND_FS_OVERWRITE=y
CONFIG_LOG_PROCESS_THREAD=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BUFFER_SIZE=20000
CONFIG_LOG_PROCESS_THREAD_SLEEP_MS=100
